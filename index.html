<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Séances Sport</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F2EE;
      --surface: #FFFFFF;
      --surface2: #EDEAE4;
      --border: #D8D4CC;
      --text: #1A1916;
      --text2: #6B6760;
      --text3: #A09C97;
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --accent: #1A1916;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .header span {
      font-size: 12px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }

    .main-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .reste-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.5rem;
    }

    .reste-number {
      font-size: 64px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
      font-family: 'DM Sans', sans-serif;
      margin-bottom: 0.25rem;
    }

    .reste-sub {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 1.25rem;
    }

    .bar-wrap {
      margin-bottom: 0.5rem;
    }

    .bar-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      background: var(--green);
    }

    .bar-fill.warn { background: var(--amber); }
    .bar-fill.danger { background: var(--red); }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    .bar-labels span {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text3);
    }

    .metrics-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 0.75rem;
    }

    .metric-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 400;
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    .metric-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 1.25rem;
    }

    .status-badge.good { background: var(--green-light); color: #085041; }
    .status-badge.warn { background: var(--amber-light); color: #412402; }
    .status-badge.danger { background: var(--red-light); color: #501313; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge.good .dot { background: var(--green); }
    .status-badge.warn .dot { background: var(--amber); }
    .status-badge.danger .dot { background: var(--red); }

    .edit-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
    }

    .edit-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    .field {
      margin-bottom: 0.75rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 15px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      margin-top: 0.25rem;
      letter-spacing: 0.01em;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 11px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/>
      </svg>
    </div>
    <div>
      <h1>Suivi séances sport</h1>
      <span id="last-update">—</span>
    </div>
  </div>

  <div class="main-card">
    <p class="reste-label">Séances restantes</p>
    <p class="reste-number" id="reste">—</p>
    <p class="reste-sub" id="reste-sub">— séances utilisées sur —</p>

    <div id="badge-wrap" style="margin-bottom: 1.25rem;"></div>

    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="bar" style="width: 0%"></div>
      </div>
      <div class="bar-labels">
        <span id="pct-used">0% utilisées</span>
        <span id="pct-left">100% restantes</span>
      </div>
    </div>
  </div>

  <div class="metrics-row">
    <div class="metric">
      <p class="metric-label">Achetées</p>
      <p class="metric-value" id="d-total">—</p>
      <p class="metric-sub">total</p>
    </div>
    <div class="metric">
      <p class="metric-label">Effectuées</p>
      <p class="metric-value" id="d-done">—</p>
      <p class="metric-sub">solo</p>
    </div>
    <div class="metric">
      <p class="metric-label">Mathilde</p>
      <p class="metric-value" id="d-mathilde">—</p>
      <p class="metric-sub">en duo</p>
    </div>
  </div>

  <div class="edit-card">
    <p class="edit-title">Mettre à jour</p>
    <div class="field">
      <label>Total séances achetées</label>
      <input type="number" id="in-total" value="95" min="1" />
    </div>
    <div class="field">
      <label>Séances effectuées (total)</label>
      <input type="number" id="in-done" value="6" min="0" />
    </div>
    <div class="field">
      <label>Dont séances avec Mathilde</label>
      <input type="number" id="in-mathilde" value="3" min="0" />
    </div>
    <button class="btn" onclick="update()">Mettre à jour</button>
  </div>

  <p class="footer" id="footer-txt"></p>

</div>

<script>
  function update() {
    const total = parseInt(document.getElementById('in-total').value) || 0;
    const done = parseInt(document.getElementById('in-done').value) || 0;
    const mathilde = parseInt(document.getElementById('in-mathilde').value) || 0;
    const reste = total - done;
    const pctUsed = total > 0 ? Math.round((done / total) * 100) : 0;
    const pctLeft = 100 - pctUsed;

    document.getElementById('reste').textContent = reste;
    document.getElementById('reste-sub').textContent = done + ' séance' + (done > 1 ? 's' : '') + ' utilisée' + (done > 1 ? 's' : '') + ' sur ' + total;
    document.getElementById('d-total').textContent = total;
    document.getElementById('d-done').textContent = done - mathilde;
    document.getElementById('d-mathilde').textContent = mathilde;
    document.getElementById('pct-used').textContent = pctUsed + '% utilisées';
    document.getElementById('pct-left').textContent = pctLeft + '% restantes';

    const bar = document.getElementById('bar');
    bar.style.width = pctUsed + '%';
    bar.className = 'bar-fill' + (pctUsed >= 80 ? ' danger' : pctUsed >= 60 ? ' warn' : '');

    const badge = document.getElementById('badge-wrap');
    let cls, txt;
    if (pctUsed < 60) {
      cls = 'good'; txt = 'Bon rythme';
    } else if (pctUsed < 80) {
      cls = 'warn'; txt = 'Plus de la moitié utilisée';
    } else {
      cls = 'danger'; txt = 'Moins de 20% restantes';
    }
    badge.innerHTML = '<span class="status-badge ' + cls + '"><span class="dot"></span>' + txt + '</span>';

    const now = new Date();
    const opts = { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' };
    document.getElementById('last-update').textContent = 'Mis à jour le ' + now.toLocaleDateString('fr-FR', opts);
    document.getElementById('footer-txt').textContent = reste + ' séances · ' + total + ' achetées · ' + pctLeft + '% restantes';

    localStorage.setItem('sport_widget', JSON.stringify({ total, done, mathilde }));
  }

  const saved = localStorage.getItem('sport_widget');
  if (saved) {
    try {
      const d = JSON.parse(saved);
      document.getElementById('in-total').value = d.total;
      document.getElementById('in-done').value = d.done;
      document.getElementById('in-mathilde').value = d.mathilde;
    } catch(e) {}
  }
  update();
</script>
</body>
</html>
